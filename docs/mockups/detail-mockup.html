<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Mockup — World Cup Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6">
  <div class="mx-auto max-w-4xl space-y-8">
    <a href="#" class="text-sm text-emerald-400">← Back to matches</a>
    <header>
      <p class="text-sm text-slate-400">Sun, Jun 15, 6:00 PM · GROUP_STAGE</p>
      <h1 class="text-3xl font-bold">Argentina vs Brazil</h1>
      <p class="text-slate-400">Group A</p>
    </header>
    <section class="rounded-xl border border-slate-800 bg-slate-800 p-6">
      <h2 class="mb-4 text-lg font-semibold text-emerald-400">Prediction</h2>
      <div class="grid grid-cols-3 gap-4">
        <div><p class="text-slate-500">Winner</p><p class="text-xl font-bold">Argentina</p></div>
        <div><p class="text-slate-500">Goal difference</p><p class="text-xl font-bold">1</p></div>
        <div><p class="text-slate-500">Confidence</p><p class="text-xl font-bold">82/100</p></div>
      </div>
    </section>
    <section class="rounded-xl border border-slate-800 bg-slate-800 p-6">
      <h2 class="mb-4 text-lg font-semibold text-emerald-400">Polymarket probabilities</h2>
      <div class="space-y-3">
        <div><div class="flex justify-between text-sm"><span>Argentina</span><span>64%</span></div><div class="mt-1 h-2 rounded-full bg-slate-700"><div class="h-2 w-[64%] rounded-full bg-emerald-500"></div></div></div>
        <div><div class="flex justify-between text-sm"><span>Brazil</span><span>36%</span></div><div class="mt-1 h-2 rounded-full bg-slate-700"><div class="h-2 w-[36%] rounded-full bg-emerald-500"></div></div></div>
      </div>
      <div class="mt-6 grid grid-cols-2 gap-4 text-sm">
        <div><p class="text-slate-500">Volume</p><p>$50,000</p></div>
        <div><p class="text-slate-500">Liquidity</p><p>$25,000</p></div>
      </div>
    </section>
    <section class="grid grid-cols-2 gap-4">
      <div class="rounded-lg bg-slate-900 p-4"><p class="text-emerald-400">Argentina</p><p class="text-2xl">W W D L W</p></div>
      <div class="rounded-lg bg-slate-900 p-4"><p class="text-emerald-400">Brazil</p><p class="text-2xl">W L W W D</p></div>
    </section>
  </div>
</body>
</html>
