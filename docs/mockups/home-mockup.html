<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Mockup — World Cup Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6">
  <div class="mx-auto max-w-6xl space-y-10">
    <header>
      <h1 class="text-3xl font-bold">World Cup Predictor</h1>
      <p class="mt-2 text-slate-400">Polymarket insights + Football-Data form</p>
    </header>
    <section>
      <h2 class="mb-4 text-xl font-bold text-emerald-400">Today</h2>
      <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <div class="rounded-xl border border-slate-800 bg-slate-800 p-4">
          <p class="text-xs text-slate-400">Sun, Jun 15, 6:00 PM</p>
          <p class="mt-3 text-lg font-semibold">Argentina</p>
          <p class="text-sm text-slate-400">vs</p>
          <p class="text-lg font-semibold">Brazil</p>
          <div class="mt-4 grid grid-cols-2 gap-2 text-sm">
            <div><span class="text-slate-500">Winner</span><p class="text-emerald-400">Argentina</p></div>
            <div><span class="text-slate-500">Home win</span><p>64%</p></div>
            <div><span class="text-slate-500">Goal diff</span><p>1</p></div>
            <div><span class="text-slate-500">Confidence</span><p class="text-emerald-300">82</p></div>
          </div>
        </div>
      </div>
    </section>
    <section>
      <h2 class="mb-4 text-xl font-bold text-emerald-400">Tomorrow</h2>
      <p class="rounded-xl border border-dashed border-slate-700 p-6 text-center text-slate-500">No matches scheduled.</p>
    </section>
  </div>
</body>
</html>
